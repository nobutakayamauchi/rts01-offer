<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RTS Offer</title>
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#f6f8fb;
      color:#111827;
      line-height:1.7;
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:20px;
    }
    .card{
      background:#fff;
      border-radius:18px;
      padding:22px;
      margin:16px 0;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
    }
    .hero{
      padding:28px 22px;
    }
    .eyebrow{
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#6b7280;
      margin:0 0 8px;
    }
    h1{
      font-size:32px;
      line-height:1.2;
      margin:8px 0 14px;
    }
    h2{
      font-size:22px;
      margin:0 0 12px;
    }
    .lead{
      font-size:18px;
      color:#374151;
    }
    .textlink{
      color:#111827;
      font-weight:600;
      text-decoration:none;
    }
    p{
      margin:0 0 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card hero">
      <p class="eyebrow">RTS Offer Hub</p>
      <h1>RTS Offer</h1>
      <p class="lead">RTS関連の販売導線とサービスページをまとめたハブです。</p>
      <p>
        RTS本体とは分離して、販売ページ、特定商取引法表記、今後のサービス導線を
        ここに集約していきます。
      </p>
    </section>

    <section class="card">
      <h2>Offers</h2>
      <p>
        <a class="textlink" href="https://nobutakayamauchi.github.io/rts01-offer/offer/initial-flow.html">
          新規案件 初動フローチャート策定
        </a>
      </p>
      <p>新規案件1件に対し、実装前の最短・最小限フローチャートを整理します。</p>
    </section>

    <section class="card">
      <h2>Legal</h2>
      <p>
        <a class="textlink" href="https://nobutakayamauchi.github.io/rts01-offer/legal/tokushoho.html">
          特定商取引法に基づく表記
        </a>
      </p>
    </section>

    <section class="card">
      <h2>RTS</h2>
      <p>
        <a class="textlink" href="https://github.com/nobutakayamauchi/RTS">
          RTS Public Repository
        </a>
      </p>
      <p>開発実例・公開リポジトリはこちらです。</p>
    </section>
  </main>
</body>
</html>
